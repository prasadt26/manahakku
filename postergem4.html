<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mana Hakku | News Poster Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;700&family=Ramabhadra&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-news: #1a237e; 
            --gold-premium: #d4af37;
            --dark-bg: #0f172a;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            font-family: 'Inter', 'Noto Sans Telugu', sans-serif;
            min-height: 100vh;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .gradient-border-box {
            padding: 3px;
            background: linear-gradient(60deg, #1a237e, #d4af37, #c00, #1a237e);
            background-size: 300% 300%;
            animation: moveGradient 4s alternate infinite;
            border-radius: 22px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        canvas {
            max-width: 100%;
            height: auto !important;
            background: white;
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        .section-title {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary-news);
            margin-bottom: 5px;
            display: block;
            margin-top: 15px;
        }

        .btn-generate {
            background: #1a237e;
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px;
        }

        .btn-download {
            background: #c00;
            color: white;
            border: none;
            padding: 12px;
        }

        .char-counter {
            font-size: 0.7rem;
            color: #64748b;
            text-align: right;
            display: block;
            margin-bottom: 10px;
        }

        .page-header {
            background: #0f172a;
            padding: 15px;
            color: white;
            border-bottom: 4px solid #d4af37;
            margin-bottom: 30px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #64748b;
        }
    </style>
</head>

<body>

<header class="page-header text-center">
    <h2 class="mb-0" style="font-family: 'Ramabhadra';">మన హక్కు <span style="font-weight: 300; font-size: 1.2rem; color: #d4af37;">Poster Studio</span></h2>
</header>

<div class="container-fluid px-4 pb-5">
    <div class="row">
        <div class="col-lg-4 col-xl-3">
            <div class="gradient-border-box">
                <div class="control-panel">
                    <label class="section-title">1. PHOTO & ADJUSTMENTS</label>
                    <input type="file" id="imageUpload" class="form-control mb-3">
                    
                    <div class="slider-label"><span>Vertical Position</span><span id="posVal">50%</span></div>
                    <input type="range" id="imageYOffset" class="form-range mb-2" min="0" max="100" value="50">
                    
                    <div class="slider-label"><span>Zoom</span><span id="zoomVal">1.0x</span></div>
                    <input type="range" id="imageZoom" class="form-range mb-3" min="100" max="300" value="100">

                    <label class="section-title">2. HEADLINE (AUTO-SCALING)</label>
                    <textarea id="headline" class="form-control" rows="2" placeholder="Enter headline..." maxlength="120"></textarea>
                    <span id="headlineCounter" class="char-counter">0 / 120</span>

                    <label class="section-title">3. DESCRIPTION (AUTO-SCALING)</label>
                    <textarea id="description" rows="4" class="form-control" placeholder="Write news content..." maxlength="1000"></textarea>
                    <span id="descriptionCounter" class="char-counter">0 / 1000</span>

                    <label class="section-title">4. DATE</label>
                    <input type="date" id="dateInput" class="form-control mb-4">

                    <button class="btn btn-generate w-100 mb-2" onclick="generatePoster()">GENERATE POSTER</button>
                    <button class="btn btn-download w-100" onclick="downloadPoster()">DOWNLOAD PNG</button>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-xl-9 text-center">
            <canvas id="posterCanvas" width="1500" height="2600"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("posterCanvas");
    const ctx = canvas.getContext("2d");
    const logo = new Image();
    logo.src = "logo.png"; 

    const hInput = document.getElementById('headline');
    const dInput = document.getElementById('description');
    const ySlider = document.getElementById('imageYOffset');
    const zSlider = document.getElementById('imageZoom');
    
    // UI Update Listeners
    hInput.addEventListener('input', () => { document.getElementById('headlineCounter').textContent = `${hInput.value.length} / 120`; });
    dInput.addEventListener('input', () => { document.getElementById('descriptionCounter').textContent = `${dInput.value.length} / 1000`; });
    
    // Live update on slider move
    ySlider.addEventListener('input', () => { 
        document.getElementById('posVal').textContent = ySlider.value + "%";
        generatePoster(); 
    });
    zSlider.addEventListener('input', () => { 
        document.getElementById('zoomVal').textContent = (zSlider.value / 100).toFixed(1) + "x";
        generatePoster(); 
    });

    let currentMainImage = null;

    function generatePoster(){
        const imageFile = document.getElementById("imageUpload").files[0];
        
        // If we already have an image loaded, we don't need to read the file again
        if (currentMainImage && !imageFile) {
            drawPoster(currentMainImage);
            return;
        }

        if(!imageFile) { alert("Please upload an image!"); return; }

        const reader = new FileReader();
        reader.onload = (e) => {
            const mainImage = new Image();
            mainImage.src = e.target.result;
            mainImage.onload = () => {
                currentMainImage = mainImage;
                drawPoster(mainImage);
            };
        };
        reader.readAsDataURL(imageFile);
    }

    function drawPoster(mainImage){
        const headline = hInput.value || "Headline Here";
        const description = dInput.value || "Description text goes here...";
        let dateValue = document.getElementById("dateInput").value || new Date().toLocaleDateString("en-IN");

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const headerHeight = canvas.height * 0.12;
        const imageHeight = canvas.height * 0.45;
        const headlineHeight = canvas.height * 0.14; 
        const captionStart = headerHeight + imageHeight;

        /* 1. BACKGROUND */ 
        ctx.fillStyle="#ffffff";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        /* 2. IMAGE ADJUSTMENT LOGIC (CROP/ZOOM/SCALE) */
        const zoom = zSlider.value / 100;
        const yOffsetPercent = ySlider.value / 100;

        const imgAspect = mainImage.width / mainImage.height;
        const canvasAspect = canvas.width / imageHeight;

        let renderWidth, renderHeight, offsetX, offsetY;

        // Base Scale (Cover)
        if (imgAspect > canvasAspect) {
            renderHeight = imageHeight * zoom;
            renderWidth = (mainImage.width * (imageHeight / mainImage.height)) * zoom;
        } else {
            renderWidth = canvas.width * zoom;
            renderHeight = (mainImage.height * (canvas.width / mainImage.width)) * zoom;
        }

        // Center Horizontally
        offsetX = (canvas.width - renderWidth) / 2;
        // Vertical Position based on slider
        offsetY = (imageHeight - renderHeight) * yOffsetPercent;

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, headerHeight, canvas.width, imageHeight); // Define the "frame"
        ctx.clip(); // Ensure image doesn't leak out
        ctx.drawImage(mainImage, offsetX, headerHeight + offsetY, renderWidth, renderHeight);
        ctx.restore();

        /* 3. HEADER */
        ctx.fillStyle = "#fcec53"; 
        ctx.fillRect(0, 0, canvas.width, headerHeight);

        const padding = 20; 
        const lW = canvas.width * 0.50; 
        const lH = headerHeight - (padding * 2); 
        ctx.drawImage(logo, 60, padding, lW, lH);

        ctx.fillStyle="#1a237e"; 
        ctx.textAlign="right"; 
        
        ctx.font="bold 35px 'Ramabhadra'";
        ctx.fillText("సమాచార పత్రిక", canvas.width - 100, headerHeight/2 - 85);

        ctx.font="bold 40px 'Ramabhadra'";
        ctx.fillText(dateValue, canvas.width - 100, headerHeight/2 + 5);
        
        ctx.font="bold 50px 'Ramabhadra'";
        ctx.fillText("రామగుండం", canvas.width - 100, headerHeight/2 + 80);
        
        /* 4. HEADLINE BAR */
        const hGrad = ctx.createLinearGradient(0, captionStart, 0, captionStart + headlineHeight);
        hGrad.addColorStop(0,"#0d123e");
        hGrad.addColorStop(0.5,"#1a237e");
        hGrad.addColorStop(1,"#0d123e");

        ctx.fillStyle = hGrad;
        ctx.fillRect(0, captionStart, canvas.width, headlineHeight);
        ctx.fillStyle = "#d4af37";
        ctx.fillRect(0, captionStart, canvas.width, 8); 
        ctx.fillRect(0, captionStart + headlineHeight - 8, canvas.width, 8);

        /* 5. DYNAMIC HEADLINE */
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        
        let hFontSize = 110; 
        let hLineHeight = 120;
        let hLines = [];
        const hMaxWidth = canvas.width - 200;

        do {
            ctx.font = `bold ${hFontSize}px 'Ramabhadra'`;
            hLines = getWrappedLines(headline, hMaxWidth);
            if ((hLines.length * hLineHeight) <= (headlineHeight - 40) || hFontSize <= 65) break;
            hFontSize -= 2;
            hLineHeight -= 2.2;
        } while (hFontSize > 65);

        let hStartY = captionStart + (headlineHeight / 2) - ((hLines.length * hLineHeight) / 2) + (hFontSize * 0.8);
        hLines.forEach((line) => {
            ctx.fillText(line, canvas.width/2, hStartY);
            hStartY += hLineHeight;
        });
        ctx.shadowBlur = 0;

        /* 6. DESCRIPTION */
        const descStart = captionStart + headlineHeight;
        const descPadding = 100;
        const descMaxHeight = (canvas.height - descStart) - 180;
        const descMaxWidth = canvas.width - (descPadding * 2);

        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(0, descStart, canvas.width, canvas.height - descStart);
        ctx.fillStyle="#c00"; 
        ctx.fillRect(descPadding, descStart + 60, 200, 12);

        ctx.fillStyle="#1e293b";
        ctx.textAlign="left";

        let dFontSize = 55; 
        let dLineHeight = 85;
        let dLines = [];

        do {
            ctx.font = `${dFontSize}px 'Ramabhadra'`;
            dLines = getWrappedLines(description, descMaxWidth);
            if ((dLines.length * dLineHeight) <= descMaxHeight || dFontSize <= 30) break;
            dFontSize -= 1;
            dLineHeight -= 1.5;
        } while (dFontSize > 25);

        let dStartY = descStart + 160;
        dLines.forEach(line => {
            ctx.fillText(line, descPadding, dStartY);
            dStartY += dLineHeight;
        });

        /* 7. WATERMARK */
        ctx.save();
        ctx.globalAlpha=0.04;
        ctx.font="bold 220px 'Ramabhadra'";
        ctx.fillStyle="#000";
        ctx.textAlign="center";
        ctx.fillText("మన హక్కు", canvas.width/2, canvas.height * 0.88);
        ctx.restore();

        /* 8. BORDER */
        const bGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bGrad.addColorStop(0, "#8a6d3b");
        bGrad.addColorStop(0.5, "#d4af37");
        bGrad.addColorStop(1, "#1a237e");
        ctx.strokeStyle = bGrad;
        ctx.lineWidth = 18; 
        ctx.strokeRect(ctx.lineWidth/2, ctx.lineWidth/2, canvas.width - ctx.lineWidth, canvas.height - ctx.lineWidth);
    }

    function getWrappedLines(text, maxWidth) {
        if (!text) return [""];
        const words = text.split(" ");
        let lines = [];
        let currentLine = "";

        for (let n = 0; n < words.length; n++) {
            let testLine = currentLine + words[n] + " ";
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                lines.push(currentLine.trim());
                currentLine = words[n] + " ";
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine.trim());
        return lines;
    }

    function downloadPoster(){
        const link = document.createElement('a');
        link.download = `ManaHakku_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>

</body>
</html>
